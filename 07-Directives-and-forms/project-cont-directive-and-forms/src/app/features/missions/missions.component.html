<div class="misions">
  <h2>Here see the missions</h2>
  <p class="highlight-demo" appHighlight="#fef08a">Hover over for surprise!</p>
  <div class="mission-grid">
    @for (mission of missions; track mission.id) {
      <div class="mission-card" appHighlight="#1e3a5f">
        <div class="mission-status status-{{ mission.status }}">
          <span [appStatusStyle]="mission.status">{{ mission.status }}</span>
        </div>
        <h3>{{ mission.name }}</h3>
        <p class="destination">{{ mission.destination }}</p>
        <p class="launch-date">{{ mission.launchDate }}</p>
        <p class="crew">Crew {{ mission.crew }} astronauts</p>

        <a [routerLink]="['/missions', mission.id]" class="details-btn">View details</a>
      </div>
    }
  </div>
</div>
